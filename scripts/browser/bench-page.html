<!doctype html>
<!-- Browser benchmark harness for lua.wasm: run each experiments/ kernel
     interpreted vs AOT-compiled, timed in the host engine, and show the
     interp/AOT speedup per benchmark. This is the wasm counterpart to the
     native cells scripts/bench-all.sh produces; a browser gives a real
     optimizing engine (V8 in Chromium, SpiderMonkey in Firefox, JSC in
     WebKit), which is what the AOT-in-wasm win depends on (see
     experiments/RESULTS.md: under a baseline-only tier AOT is *slower*).

     Two ways to run it:
       1. Served: put lua-bench.wasm and the benchmark sources beside this
          file (or point the query params at them) and serve the directory
          over http --  python3 -m http.server -- then open this page.
              ?wasm=<url of lua-bench.wasm>&n=<default passes>&k=<best-of>
       2. Self-contained: scripts/make-bench-bundle.py inlines the wasm and
          the sources into one double-clickable HTML file (no server).

     One module (lua-bench.wasm) serves both legs: the interpreted leg loads
     each kernel's source and runs it through the stock interpreter; the AOT
     leg calls the same kernel from package.preload (aot_<name>). The
     interpreter bytecode path is identical either way, so the comparison is
     honest. Timing is wall-clock around a fresh _start per run (the module
     is compiled once and its hot functions tier up across runs, so a warmup
     run precedes the measured best-of-k); it includes a fixed VM-init cost
     identical to both legs, so a reported speedup slightly UNDER-states the
     pure-kernel ratio. window.__benchresults carries the finished rows for
     an automated driver. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>lua.wasm benchmark harness</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 24px; background: #16141f; color: #e9e7f4;
         font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
         font-size: 13px; line-height: 1.5; }
  h1 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  #meta { color: #9a97b2; margin-bottom: 16px; }
  .controls { margin-bottom: 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  label { color: #9a97b2; }
  input { width: 72px; background: #221f2e; color: #e9e7f4; border: 1px solid #3a3550;
          border-radius: 4px; padding: 3px 6px; font: inherit; }
  button { background: #6c5ce7; color: #fff; border: 0; border-radius: 4px;
           padding: 6px 14px; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  table { border-collapse: collapse; margin-top: 8px; }
  th, td { padding: 6px 14px; text-align: right; border-bottom: 1px solid #2c2839; }
  th:first-child, td:first-child { text-align: left; }
  th { color: #9a97b2; font-weight: 600; }
  .win { color: #6ee7a8; }
  .flat { color: #e7c96e; }
  .bad { color: #e76e8a; }
  #status { margin-top: 14px; color: #9a97b2; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>lua.wasm benchmark harness</h1>
<div id="meta"></div>
<div class="controls">
  <span><label>passes (N override)</label> <input id="n" type="number" min="1" placeholder="default"></span>
  <span><label>best of</label> <input id="k" type="number" min="1" value="5"></span>
  <button id="run">Run benchmarks</button>
  <button id="csv" disabled>Download CSV</button>
</div>
<table id="results" hidden>
  <thead><tr>
    <th>benchmark</th><th>N</th><th>interp (ms)</th><th>AOT (ms)</th>
    <th>speedup</th><th>correct</th>
  </tr></thead>
  <tbody></tbody>
</table>
<div id="status">idle.</div>

<script type="module">
import { WasiPreview1 } from './wasi-stdio-shim.mjs';

// Default benchmark set. Each carries the problem size and the checksum a
// correct run prints (from the native reference, experiments/RESULTS.md).
const BENCHES = (window.__BENCHES) || [
  { name: 'dataplane', n: 2000, expect: '30019646000' },
  { name: 'codec',     n: 3000, expect: '1988952016'  },
  { name: 'dsp',       n: 2000, expect: '493853'       },
];

const params  = new URLSearchParams(location.search);
const wasmUrl = params.get('wasm') || './lua-bench.wasm';
const nOverride = params.get('n');
const status = document.getElementById('status');
const setStatus = t => { status.textContent = t; };

// Inlined by make-bench-bundle.py for the self-contained file; else fetched.
const INLINE_WASM = window.__WASM_BYTES || null;   // Uint8Array
const INLINE_SRC  = window.__SOURCES   || null;    // { name: source }

async function loadModule() {
  if (INLINE_WASM) return WebAssembly.compile(INLINE_WASM);
  return WebAssembly.compileStreaming(fetch(wasmUrl));
}
async function loadSource(name) {
  if (INLINE_SRC) return INLINE_SRC[name];
  const r = await fetch(`./${name}.lua`);
  if (!r.ok) throw new Error(`fetch ${name}.lua: ${r.status}`);
  return r.text();
}

// Choose a long-bracket level that does not collide with the source, so the
// interpreted leg can embed the kernel verbatim inside a -e driver program.
function longBracket(src) {
  let lvl = 0;
  while (src.includes(']' + '='.repeat(lvl) + ']')) lvl++;
  const eq = '='.repeat(lvl);
  return { open: '[' + eq + '[', close: ']' + eq + ']' };
}

// Build the single -e program for one run. The attached -e form (one argv
// entry, no script positional) is what the WASI shim's argv path expects.
function driver(mode, name, n, src) {
  let getf;
  if (mode === 'aot') {
    getf = `assert(package.preload['aot_${name}'],'aot_${name} missing')()`;
  } else {
    const b = longBracket(src);
    getf = `assert(load(${b.open}${src}${b.close},'@${name}'))()`;
  }
  // Suppress the kernel's own print/io.write for the timed call (as
  // scripts/bench.lua does), so a benchmark that emits a lot -- mandelbrot
  // streams a ~N*N-bit PPM -- is not measuring the shim's stdout path
  // equally on both legs and diluting the ratio. Restore, then emit the
  // checksum on the RESULT: line the driver reads back.
  return `local f=${getf} `
       + `local _p,_w=print,io.write `
       + `print=function() end io.write=function() return io.stdout end `
       + `local r=f(${n}) `
       + `print=_p io.write=_w `
       + `io.write('RESULT:'..tostring(r))`;
}

// One measured run: fresh instance, time _start only, capture RESULT: line.
function runOnce(module, program) {
  let captured = '';
  const wasi = new WasiPreview1({
    args: ['lua', '-e' + program],
    stdout: line => { const m = line.match(/RESULT:(.*)/); if (m) captured = m[1]; },
    stderr: line => { captured = captured || ('ERR:' + line); },
  });
  return WebAssembly.instantiate(module, wasi.importsFor(module)).then(instance => {
    const t0 = performance.now();
    const code = wasi.start(instance);
    const dt = performance.now() - t0;
    if (code !== 0) throw new Error(`exit ${code}: ${captured}`);
    return { ms: dt, result: captured };
  });
}

async function bestOf(module, program, k) {
  await runOnce(module, program);                 // warmup: tier the hot code
  let best = Infinity, result = null;
  for (let i = 0; i < k; i++) {
    const r = await runOnce(module, program);
    if (r.ms < best) best = r.ms;
    result = r.result;
  }
  return { ms: best, result };
}

function speedupClass(x) { return x >= 1.5 ? 'win' : x >= 1.1 ? 'flat' : 'bad'; }

async function run() {
  const runBtn = document.getElementById('run');
  const csvBtn = document.getElementById('csv');
  runBtn.disabled = true; csvBtn.disabled = true;
  const tbody = document.querySelector('#results tbody');
  tbody.innerHTML = '';
  document.getElementById('results').hidden = false;

  const kIn = parseInt(document.getElementById('k').value, 10);
  const nIn = document.getElementById('n').value;
  const k = kIn > 0 ? kIn : 5;

  try {
    setStatus('compiling module…');
    const module = await loadModule();
    const rows = [];
    for (const b of BENCHES) {
      const n = nIn ? parseInt(nIn, 10) : (nOverride ? parseInt(nOverride, 10) : b.n);
      const src = await loadSource(b.name);
      setStatus(`${b.name}: interpreted…`);
      const interp = await bestOf(module, driver('interp', b.name, n, src), k);
      setStatus(`${b.name}: AOT…`);
      const aot = await bestOf(module, driver('aot', b.name, n, src), k);
      const speedup = interp.ms / aot.ms;
      const correct = interp.result === b.expect && aot.result === b.expect;
      const row = { name: b.name, n, interp_ms: interp.ms, aot_ms: aot.ms,
                    speedup, interp_result: interp.result, aot_result: aot.result,
                    expect: b.expect, correct };
      rows.push(row);

      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${b.name}</td><td>${n}</td>` +
        `<td>${interp.ms.toFixed(1)}</td><td>${aot.ms.toFixed(1)}</td>` +
        `<td class="${speedupClass(speedup)}">${speedup.toFixed(2)}×</td>` +
        `<td class="${correct ? 'win' : 'bad'}">${correct ? '✓' : '✗ ' + interp.result + '/' + aot.result}</td>`;
      tbody.appendChild(tr);
    }
    window.__benchresults = { done: true, engine: navigator.userAgent, rows };
    setStatus(`done. ${rows.length} benchmarks, best of ${k}. UA: ${navigator.userAgent}`);
    csvBtn.disabled = false;
    csvBtn.onclick = () => {
      const head = 'benchmark,N,interp_ms,aot_ms,speedup,correct\n';
      const body = rows.map(r =>
        `${r.name},${r.n},${r.interp_ms.toFixed(3)},${r.aot_ms.toFixed(3)},${r.speedup.toFixed(3)},${r.correct}`
      ).join('\n');
      const blob = new Blob([head + body + '\n'], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'lua-wasm-bench.csv';
      a.click();
    };
  } catch (err) {
    window.__benchresults = { done: true, error: String(err && err.message || err) };
    setStatus('error: ' + (err && err.message ? err.message : err));
  } finally {
    runBtn.disabled = false;
  }
}

document.getElementById('meta').textContent =
  `module: ${wasmUrl}  ·  ${BENCHES.map(b => b.name).join(', ')}`;
document.getElementById('run').addEventListener('click', run);
</script>
</body>
</html>
